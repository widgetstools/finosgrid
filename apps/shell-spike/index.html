<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>finosgrid — FI position feed shell</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body data-ag-theme-mode="light">
    <header class="top">
      <strong>finosgrid shell</strong>
      <span id="status">Starting FI position worker…</span>
      <label class="theme-toggle" title="Toggle light / dark theme">
        <span class="theme-toggle__label">Dark mode</span>
        <input id="theme-toggle" type="checkbox" role="switch" />
        <span class="theme-toggle__track" aria-hidden="true"></span>
      </label>
    </header>
    <div id="grid"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
